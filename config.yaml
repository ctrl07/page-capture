timing:
  inter_page_delay_max: 0.5
  inter_page_delay_min: 0.3
  reconnect_ms: 3000
  scroll_idle_poll_ms: 100
  scroll_idle_timeout_ms: 5000
  scroll_interval_ms: 600
  scroll_wait_for_idle: true
  stabilization_ms: 1000
viewport:
  height: 1080
  width: 1920



  # === Step 1: Core Crawl Configuration ===
  max_depth: 0                # 0 = initial URLs only, 1+ = follow links up to N hops
  max_pages: 1000             # Maximum total pages to crawl (safety limit)
  include_patterns: []        # Only crawl URLs matching these regex patterns (empty = all)
  exclude_patterns: []        # Skip URLs matching these regex patterns
  strip_query_params: false   # Strip query parameters before dedup/crawling
  respect_robots_txt: false   # Check and respect robots.txt rules
  allowed_domains: []         # Only crawl URLs within these domains (empty = derive from seed)
  blocked_domains: []         # Skip URLs from these domains

fast:
  # Fast crawl (curl_cffi) configuration
  max_retries: 3              # Number of retry attempts for failed URLs
  retry_on_status: "429,500,502,503,504"  # HTTP status codes to retry (comma-separated)
  max_workers: 8              # Maximum concurrent workers
  timeout: 30                 # Request timeout in seconds
  
  # Deep crawl settings
  max_depth: 0                # 0 = initial URLs only, 1+ = follow links up to N hops
  max_pages: 1000             # Maximum total pages to crawl (safety limit)
  include_patterns: []        # Only crawl URLs matching these regex patterns (empty = all)
  exclude_patterns: []        # Skip URLs matching these regex patterns
  strip_query_params: false   # Strip query parameters before dedup/crawling
  respect_robots_txt: false   # Check and respect robots.txt rules
  allowed_domains: []         # Only crawl URLs within these domains (empty = derive from seed)
  blocked_domains: []         # Skip URLs from these domains
  auto_discover_sitemap: false # Auto-discover URLs from sitemap.xml at seed URLs

trafilatura:
  # Trafilatura content extraction configuration (used by Fast crawl)
  enabled: true               # Enable trafilatura extraction
  output_format: "txt"        # Output format: "txt", "markdown", "json", "xml", "xmltei", "csv", "html"
  include_comments: false     # Include comments in extraction
  include_tables: true        # Include tables in extraction
  include_images: false       # Include images in extraction
  include_formatting: false   # Keep formatting elements (only for XML output)
  include_links: false        # Keep links in extraction
  favor_precision: true       # Prefer less text but correct extraction
  favor_recall: false         # Prefer more text when uncertain
  target_language: "en"       # Target language filter (ISO 639-1, empty = all)
  deduplicate: false          # Remove duplicate segments
  with_metadata: true         # Include metadata in output
  only_with_metadata: false   # Only return if all metadata present
  max_tree_size: null         # Maximum DOM tree size (null = no limit)
  fast: false                 # Use faster heuristic, skip fallback extraction
  # Author blacklist - filter out generic author names
  author_blacklist:
    - "Admin"
    - "Editor"
    - "Author"
    - "Staff"
    - "Team"
    - "Anonymous"
  # XPaths to remove before extraction (boilerplate removal)
  prune_xpath:
    - "//nav"
    - "//aside"
    - "//footer"
    - "//header"
    - ".cookie-banner"
    - ".cookie-consent"
    - "#cookie-notice"
    - "[id*='cookie']"
    - "[class*='cookie']"
    - ".sidebar"
    - ".advertisement"
    - "[class*='ads']"
    - "[class*='banner']"
    - "[class*='popup']"
    - "[class*='modal']"
    - "[class*='overlay']"
  # htmldate configuration for date extraction
  date_extraction_params:
    extensive_search: true    # Extensive search for dates
    max_date: null            # Maximum date filter (YYYY-MM-DD or null)
    min_date: null            # Minimum date filter (YYYY-MM-DD or null)
