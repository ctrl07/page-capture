name: Page Capture

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "URLs to process (one per line)"
        required: true
        type: string
      kind:
        description: "Job type"
        required: false
        default: screenshot
        type: choice
        options:
          - screenshot
          - seo

  schedule:
    # Every 2 hours — unlimited free cron on GHA
    - cron: "38 */2 * * *"

  push:
    branches: [main]

jobs:
  capture:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      KIND: ${{ inputs.kind || 'screenshot' }}
      URLS: ${{ inputs.urls || 'https://example.com\nhttps://example.org' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade pyautogui python-xlib

      - name: Install chromedriver
        run: |
          seleniumbase install chromedriver

      - name: Run capture
        run: |
          python run_capture.py

      - name: Upload screenshots
        if: env.KIND == 'screenshot'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            photos/*.png
            output/capture_results.csv
          if-no-files-found: warn
          retention-days: 90

      - name: Upload SEO results
        if: env.KIND == 'seo'
        uses: actions/upload-artifact@v4
        with:
          name: seo-results-${{ github.run_id }}
          path: output/seo_results.csv
          if-no-files-found: warn
          retention-days: 90
